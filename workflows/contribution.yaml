name: contribution
description: Documented open source contribution workflow — every step logged
start: study

nodes:
  study:
    task: |
      DOCUMENT: study node start
      1. Read project structure, issue description, contribution guidelines
      2. Run fleet_inspect_repo() for repo health
      3. Run github_create_branch(repo_path, branch_name, base_branch)
      4. LOG via memory_project_note(project, "Study: <summary of what needs to change>")
      5. LOG via evolution_record(category="contribution", lesson="Study completed for <issue>")
    next: implement

  implement:
    task: |
      DOCUMENT: implement node start
      1. Call code_generate(spec, repo_path, file_path) or file_write() for each file
      2. Run github_status(repo_path) to verify diff
      3. Run linting if available
      4. LOG via memory_project_note(project, "Implement: <what was changed>")
      5. LOG via evolution_record(category="contribution", lesson="<files changed and why>")
    next: test

  test:
    task: |
      DOCUMENT: test node start
      1. Run tests (pytest or fleet_inspect_repo with aspect="tests")
      2. LOG via memory_project_note(project, "Test: <results>")
    branches:
      - condition: tests pass
        next: submit
      - condition: tests fail
        next: implement

  submit:
    task: |
      DOCUMENT: submit node start
      1. Call github_commit(repo_path, message, files)
      2. Call github_push(repo_path, origin, branch)
      3. Call github_create_pr(owner, repo, title, body, head, base)
      4. LOG via memory_project_note(project, "PR created: <url>")
      5. LOG via evolution_record(category="contribution", lesson="PR <number> submitted")
    next: verify

  verify:
    task: |
      DOCUMENT: verify node start
      1. Call github_get_pr(owner, repo, number) to review
      2. Call github_merge_pr(owner, repo, number) if approved
      3. LOG via memory_project_note(project, "PR merged: <number>")
      4. LOG via evolution_record(category="contribution", lesson="PR <number> merged")
    branches:
      - condition: merged
        next: done
      - condition: review changes requested
        next: implement
      - condition: CI failure
        next: implement

  done:
    task: |
      DOCUMENT: done node start
      1. Record completion: evolution_record() with final summary
      2. memory_project_note(project, "Done: <full summary>")
      3. Celebrate.
    terminal: true
